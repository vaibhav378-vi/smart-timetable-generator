<!DOCTYPE html>
<html>
<head>
    <title>Set Availability</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f5f7fb;">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard/">🏠 Home</a>
        <div class="ms-auto">
            <a href="/subjects/" class="btn btn-light btn-sm me-2">Subjects</a>
            <a href="/availability/" class="btn btn-light btn-sm me-2">Availability</a>
            <a href="/exams/" class="btn btn-light btn-sm me-2">Exams</a>
            <a href="/weekly-timetable/" class="btn btn-light btn-sm me-2">Timetable</a>
            <a href="/logout/" class="btn btn-warning btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px; border-radius: 18px;">
        <h2 class="mb-4 text-center">Set Daily Study Hours</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Monday Hours</label>
                <input type="number" step="0.5" name="monday_hours" class="form-control" value="{{ availability.monday_hours }}">
            </div>

            <div class="mb-3">
                <label>Tuesday Hours</label>
                <input type="number" step="0.5" name="tuesday_hours" class="form-control" value="{{ availability.tuesday_hours }}">
            </div>

            <div class="mb-3">
                <label>Wednesday Hours</label>
                <input type="number" step="0.5" name="wednesday_hours" class="form-control" value="{{ availability.wednesday_hours }}">
            </div>

            <div class="mb-3">
                <label>Thursday Hours</label>
                <input type="number" step="0.5" name="thursday_hours" class="form-control" value="{{ availability.thursday_hours }}">
            </div>

            <div class="mb-3">
                <label>Friday Hours</label>
                <input type="number" step="0.5" name="friday_hours" class="form-control" value="{{ availability.friday_hours }}">
            </div>

            <div class="mb-3">
                <label>Saturday Hours</label>
                <input type="number" step="0.5" name="saturday_hours" class="form-control" value="{{ availability.saturday_hours }}">
            </div>

            <div class="mb-3">
                <label>Sunday Hours</label>
                <input type="number" step="0.5" name="sunday_hours" class="form-control" value="{{ availability.sunday_hours }}">
            </div>

            <button type="submit" class="btn btn-primary w-100">Save Availability</button>
        </form>
    </div>
</div>

</body>
</html>
