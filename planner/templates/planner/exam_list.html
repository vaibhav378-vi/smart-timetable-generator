<!DOCTYPE html>
<html>
<head>
    <title>Exam List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f5f7fb;">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard/">🏠 Home</a>
        <div class="ms-auto">
            <a href="/subjects/" class="btn btn-light btn-sm me-2">Subjects</a>
            <a href="/availability/" class="btn btn-light btn-sm me-2">Availability</a>
            <a href="/exams/" class="btn btn-light btn-sm me-2">Exams</a>
            <a href="/weekly-timetable/" class="btn btn-light btn-sm me-2">Timetable</a>
            <a href="/logout/" class="btn btn-warning btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4" style="border-radius: 18px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Exam List</h2>
            <a href="/exams/add/" class="btn btn-primary">+ Add Exam</a>
        </div>

        {% if exams %}
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Exam Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for exam in exams %}
                    <tr>
                        <td>{{ exam.subject.name }}</td>
                        <td>{{ exam.exam_date }}</td>
                        <td>
                            <a href="/exams/delete/{{ exam.id }}/" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        {% else %}
            <p>No exams added yet.</p>
        {% endif %}
    </div>
</div>

</body>
</html>
