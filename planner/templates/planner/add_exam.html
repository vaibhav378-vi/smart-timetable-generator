<!DOCTYPE html>
<html>
<head>
    <title>Add Exam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f5f7fb;">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard/">🏠 Home</a>
        <div class="ms-auto">
            <a href="/subjects/" class="btn btn-light btn-sm me-2">Subjects</a>
            <a href="/availability/" class="btn btn-light btn-sm me-2">Availability</a>
            <a href="/exams/" class="btn btn-light btn-sm me-2">Exams</a>
            <a href="/weekly-timetable/" class="btn btn-light btn-sm me-2">Timetable</a>
            <a href="/logout/" class="btn btn-warning btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 550px; border-radius: 18px;">
        <h2 class="mb-4 text-center">Add Exam</h2>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Select Subject</label>
                <select name="subject" class="form-control" required>
                    <option value="">Select Subject</option>
                    {% for subject in subjects %}
                        <option value="{{ subject.id }}">{{ subject.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Exam Date</label>
                <input type="date" name="exam_date" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Add Exam</button>
        </form>

        <a href="/exams/" class="btn btn-secondary w-100 mt-3">Back to Exam List</a>
    </div>
</div>

</body>
</html>
